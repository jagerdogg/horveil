<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#1a1a18"/>
  
  <!-- Watch case -->
  <circle cx="400" cy="225" r="140" fill="none" stroke="#3a3a38" stroke-width="12"/>
  <circle cx="400" cy="225" r="128" fill="#242422"/>
  
  <!-- Hour markers -->
  <line x1="400" y1="102" x2="400" y2="118" stroke="#8B6F47" stroke-width="3" stroke-linecap="round"/>
  <line x1="400" y1="332" x2="400" y2="348" stroke="#8B6F47" stroke-width="3" stroke-linecap="round"/>
  <line x1="272" y1="225" x2="288" y2="225" stroke="#8B6F47" stroke-width="3" stroke-linecap="round"/>
  <line x1="512" y1="225" x2="528" y2="225" stroke="#8B6F47" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Minor markers -->
  <line x1="465" y1="108" x2="470" y2="122" stroke="#3a3a38" stroke-width="2" stroke-linecap="round"/>
  <line x1="520" y1="152" x2="508" y2="162" stroke="#3a3a38" stroke-width="2" stroke-linecap="round"/>
  <line x1="335" y1="108" x2="330" y2="122" stroke="#3a3a38" stroke-width="2" stroke-linecap="round"/>
  <line x1="280" y1="152" x2="292" y2="162" stroke="#3a3a38" stroke-width="2" stroke-linecap="round"/>
  <line x1="465" y1="342" x2="470" y2="328" stroke="#3a3a38" stroke-width="2" stroke-linecap="round"/>
  <line x1="520" y1="298" x2="508" y2="288" stroke="#3a3a38" stroke-width="2" stroke-linecap="round"/>
  <line x1="335" y1="342" x2="330" y2="328" stroke="#3a3a38" stroke-width="2" stroke-linecap="round"/>
  <line x1="280" y1="298" x2="292" y2="288" stroke="#3a3a38" stroke-width="2" stroke-linecap="round"/>

  <!-- Hour hand -->
  <line x1="400" y1="225" x2="400" y2="160" stroke="#c9a96e" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Minute hand -->
  <line x1="400" y1="225" x2="448" y2="152" stroke="white" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Second hand -->
  <line x1="400" y1="225" x2="370" y2="270" stroke="#8B6F47" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Center dot -->
  <circle cx="400" cy="225" r="5" fill="#8B6F47"/>
</svg>
